name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: ktsim-x86_64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: ktsim-x86_64-macos
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: ktsim-aarch64-macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: ktsim-x86_64-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Sign binary (ad-hoc)
        if: matrix.os == 'macos-latest'
        run: codesign --sign - --force --preserve-metadata=entitlements,requirements,flags,runtime "target/${{ matrix.target }}/release/ktsim"

      - name: Rename binary
        shell: bash
        run: |
          src="target/${{ matrix.target }}/release/ktsim${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          cp "$src" "${{ matrix.asset }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
